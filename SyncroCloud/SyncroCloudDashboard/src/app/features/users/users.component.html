<div class="page-header">
  <h2>Users</h2>
</div>

@if (loading()) {
  <div class="loading-container"><mat-spinner diameter="48" /></div>
} @else if (users.length === 0) {
  <div class="empty-state">
    <mat-icon>group_off</mat-icon>
    <p>No users found.</p>
  </div>
} @else {
  <table mat-table [dataSource]="users" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let u">{{ u.firstName }} {{ u.lastName }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let u">
        <mat-chip [color]="u.isActive ? 'primary' : 'warn'" highlighted>
          {{ u.isActive ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Created</th>
      <td mat-cell *matCellDef="let u">{{ u.createdAt | date:'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let u">
        <button mat-icon-button color="warn" (click)="delete(u.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
}
