<div class="page-header">
  <h2>Tenants</h2>
  <button mat-raised-button color="primary" (click)="showForm = !showForm">
    <mat-icon>add</mat-icon> New Tenant
  </button>
</div>

@if (showForm) {
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()" class="inline-form">
        <mat-form-field appearance="outline">
          <mat-label>Tenant Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
        <button mat-button type="button" (click)="showForm = false">Cancel</button>
      </form>
    </mat-card-content>
  </mat-card>
}

@if (loading()) {
  <div class="loading-container"><mat-spinner diameter="48" /></div>
} @else if (tenants.length === 0) {
  <div class="empty-state">
    <mat-icon>business</mat-icon>
    <p>No tenants yet. Create the first one.</p>
  </div>
} @else {
  <table mat-table [dataSource]="tenants" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let t">{{ t.name }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let t">
        <mat-chip [color]="t.isActive ? 'primary' : 'warn'" highlighted>
          {{ t.isActive ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Created</th>
      <td mat-cell *matCellDef="let t">{{ t.createdAt | date:'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let t">
        <button mat-icon-button color="warn" (click)="delete(t.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
}
